<?xml version="1.0" encoding="UTF-8"?>
<!-- V84 mark — 84 at half the V's height. White background (with thin black outline), black V, red 84. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="V84">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="16" y="16" width="224" height="224" rx="48" fill="#ffffff" stroke="#000000" stroke-width="4" filter="url(#shadow)"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="900" text-anchor="middle" dominant-baseline="middle">
    <text x="108" y="148" font-size="140" fill="#000000">V</text>
    <text x="178" y="188" font-size="70" fill="#dc2626">84</text>
  </g>
</svg>
